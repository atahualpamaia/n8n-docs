<!DOCTYPE html>
<html lang="en" data-theme="light"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Snov.io Sales Playbook</title>
<style>
:root{--purple:#6B5CE7;--purple-dim:rgba(107,92,231,0.08);--sidebar-w:280px;--sidebar-collapsed:48px;--cat-lead:#3B82F6;--cat-deal:#10B981;--cat-call:#8B5CF6;--cat-infra:#F59E0B}
[data-theme=light]{--bg:#f5f5f7;--surface:#fff;--surface2:#f5f5f7;--border:rgba(0,0,0,0.09);--text:#1d1d1f;--text2:#6e6e73;--text3:#999;--header-bg:#fff;--nav-active-bg:rgba(107,92,231,0.07);--card-hover:rgba(107,92,231,0.04)}
[data-theme=dark]{--bg:#0d0d0d;--surface:#1a1a1a;--surface2:#111;--border:rgba(255,255,255,0.08);--text:rgba(255,255,255,0.92);--text2:rgba(255,255,255,0.5);--text3:rgba(255,255,255,0.28);--header-bg:#111;--nav-active-bg:rgba(107,92,231,0.14);--card-hover:rgba(107,92,231,0.08)}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;font-size:13px;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5}

/* Topbar */
.topbar{position:fixed;top:0;left:0;right:0;height:44px;background:var(--header-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px 0 0;z-index:200}
.topbar-brand{width:var(--sidebar-w);padding:0 16px;display:flex;align-items:center;gap:8px;border-right:1px solid var(--border);height:100%;flex-shrink:0;transition:width .25s ease}
body.sidebar-collapsed .topbar-brand{width:var(--sidebar-collapsed);padding:0 12px;justify-content:center}
body.sidebar-collapsed .topbar-brand .brand-name,
body.sidebar-collapsed .topbar-brand .brand-sep,
body.sidebar-collapsed .topbar-brand .brand-sub{display:none}
.brand-logo{width:22px;height:22px;border-radius:6px;background:var(--purple);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:11px;flex-shrink:0}
.brand-name{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-.01em;white-space:nowrap}.brand-sep{color:var(--text3);margin:0 4px}.brand-sub{font-size:12px;color:var(--text2);white-space:nowrap}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.topbar-meta{font-size:11px;color:var(--text3)}
.theme-toggle{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px;gap:1px}
.theme-btn{padding:3px 8px;border-radius:4px;border:none;background:transparent;cursor:pointer;font-size:11px;font-weight:500;color:var(--text3);transition:all .12s}
.theme-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.1)}
.btn-icon{padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;font-size:11px;color:var(--text2);transition:all .12s;display:flex;align-items:center;gap:4px}
.btn-icon:hover{background:var(--purple-dim);color:var(--text)}

/* Sidebar */
.sidebar{position:fixed;top:44px;left:0;width:var(--sidebar-w);height:calc(100vh - 44px);background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;z-index:100;transition:width .25s ease;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:0}
body.sidebar-collapsed .sidebar{width:var(--sidebar-collapsed);overflow:visible}

.nav-section{padding:12px 12px 4px}
body.sidebar-collapsed .nav-section{padding:8px 6px 4px}
.nav-section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:4px 8px;margin-bottom:2px}
body.sidebar-collapsed .nav-section-label{display:none}
.nav-item{display:flex;align-items:center;gap:8px;padding:5px 8px;font-size:12px;color:var(--text2);text-decoration:none;border-radius:6px;transition:all .12s;margin:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;position:relative}
.nav-item:hover{color:var(--text);background:var(--purple-dim)}
.nav-item .nav-icon{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:600;color:white}
.nav-item .nav-label{overflow:hidden;text-overflow:ellipsis}
body.sidebar-collapsed .nav-item{padding:5px 0;justify-content:center}
body.sidebar-collapsed .nav-item .nav-label{display:none}
body.sidebar-collapsed .nav-item .nav-icon{width:28px;height:28px;border-radius:6px;font-size:12px}

/* Tooltip for collapsed sidebar */
body.sidebar-collapsed .nav-item[data-tooltip]:hover::after{content:attr(data-tooltip);position:absolute;left:calc(var(--sidebar-collapsed) - 4px);top:50%;transform:translateY(-50%);background:var(--text);color:var(--bg);padding:4px 10px;border-radius:6px;font-size:11px;white-space:nowrap;z-index:300;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.15)}

.sidebar-toggle{margin-top:auto;padding:8px 12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.sidebar-toggle button{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:4px;transition:all .12s;display:flex;align-items:center}
.sidebar-toggle button:hover{color:var(--text);background:var(--purple-dim)}

/* Main */
.main{margin-left:var(--sidebar-w);padding-top:44px;transition:margin-left .25s ease}
body.sidebar-collapsed .main{margin-left:var(--sidebar-collapsed)}

/* Hero */
.hero{padding:28px 32px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:32px}
.hero-left{flex:1}.hero-eyebrow{font-size:11px;font-weight:500;color:var(--purple);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.hero h1{font-family:-apple-system,"SF Pro Display",sans-serif;font-size:28px;font-weight:700;line-height:1.1;letter-spacing:-.025em;color:var(--text);margin-bottom:8px}
.hero-desc{font-size:13px;color:var(--text2);max-width:480px;line-height:1.55}
.hero-stats{display:flex;gap:0;flex-shrink:0}.stat{padding:12px 20px;border-left:1px solid var(--border);text-align:right}
.stat-num{font-size:24px;font-weight:700;letter-spacing:-.02em;color:var(--text);line-height:1}.stat-label{font-size:11px;color:var(--text3);margin-top:3px}

/* Summary cards */
.summary{padding:24px 32px}
.summary-category{margin-bottom:24px}
.summary-category-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.summary-category-label .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s;text-decoration:none;display:block}
.card:hover{background:var(--card-hover);border-color:var(--purple);transform:translateY(-1px);box-shadow:0 2px 8px rgba(107,92,231,0.08)}
.card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.35}
.card-trigger{font-size:11px;color:var(--text3);line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-id{font-size:10px;font-family:"SF Mono",monospace;color:var(--text3);opacity:.5;margin-top:6px}

/* Workflow detail sections */
.workflow{border-bottom:1px solid var(--border)}
.wf-header{padding:20px 32px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.wf-meta{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.wf-badge{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;background:rgba(52,199,89,.1);color:#1d9c4a;padding:2px 7px;border-radius:4px;border:1px solid rgba(52,199,89,.2)}
[data-theme=dark] .wf-badge{color:#30d158}
.wf-cat{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:2px 7px;border-radius:4px}
.wf-trigger{font-size:11px;color:var(--text3);font-family:"SF Mono",monospace}
.wf-id{font-size:10px;font-family:"SF Mono",monospace;color:var(--text3);opacity:.6}
.wf-header h2{font-size:16px;font-weight:600;letter-spacing:-.015em;color:var(--text);margin-bottom:6px}
.wf-overview{font-size:13px;color:var(--text2);max-width:680px;line-height:1.6}
.wf-body{padding:20px 32px;background:var(--bg)}
.wf-cols{display:grid;grid-template-columns:340px 1fr;gap:20px}
.section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.phases{display:flex;flex-direction:column;gap:4px}
.phase{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border-radius:7px;background:var(--surface);border:1px solid var(--border);font-size:12px;color:var(--text2);line-height:1.5}
.phase-num{width:18px;height:18px;border-radius:50%;flex-shrink:0;background:var(--purple-dim);border:1px solid rgba(107,92,231,.2);color:var(--purple);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-top:1px;font-family:"SF Mono",monospace}
.phase strong{font-size:12px;font-weight:600;color:var(--text)}.phase-sep{color:var(--text3)}
.notes{font-size:12px;color:var(--text2);line-height:1.6;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--purple);padding:10px 12px;border-radius:6px}
.table-wrap{border-radius:8px;border:1px solid var(--border);overflow:hidden}
table{width:100%;border-collapse:collapse}thead tr{background:var(--surface2)}
th{padding:7px 10px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);border-bottom:1px solid var(--border)}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:top}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--purple-dim)}
.node-name{font-family:"SF Mono","Fira Mono",monospace;font-size:11px;color:var(--text);white-space:nowrap}.node-desc{font-size:12px;color:var(--text2)}
.nt{font-family:"SF Mono",monospace;font-size:10px;padding:1px 6px;border-radius:4px;background:var(--surface2);color:var(--text3);border:1px solid var(--border);white-space:nowrap}
.nt-webhook{color:#b45309;border-color:rgba(180,83,9,.2);background:rgba(255,159,10,.07)}
.nt-code{color:#854d0e;border-color:rgba(133,77,14,.2);background:rgba(255,214,10,.07)}
.nt-airtable{color:#166534;border-color:rgba(22,101,52,.2);background:rgba(52,199,89,.07)}
.nt-pipedrive,.nt-pipedriveTrigger{color:#1e40af;border-color:rgba(30,64,175,.2);background:rgba(59,130,246,.07)}
.nt-openAi,.nt-fireflies{color:#6b21a8;border-color:rgba(107,33,168,.2);background:rgba(168,85,247,.07)}
.nt-emailSend{color:#9f1239;border-color:rgba(159,18,57,.2);background:rgba(244,63,94,.07)}
.nt-merge{color:#0e7490;border-color:rgba(14,116,144,.2);background:rgba(6,182,212,.07)}
.nt-if,.nt-switch{color:#9a3412;border-color:rgba(154,52,18,.2);background:rgba(249,115,22,.07)}
.nt-calendlyTrigger{color:#166534;border-color:rgba(22,101,52,.2);background:rgba(52,199,89,.07)}
.nt-filter{color:#9a3412;border-color:rgba(154,52,18,.2);background:rgba(249,115,22,.07)}
.nt-scheduleTrigger{color:#0e7490;border-color:rgba(14,116,144,.2);background:rgba(6,182,212,.07)}
.nt-httpRequest{color:#0e7490;border-color:rgba(14,116,144,.2);background:rgba(6,182,212,.07)}
.nt-wait{color:#6b21a8;border-color:rgba(107,33,168,.2);background:rgba(168,85,247,.07)}
.nt-supabase{color:#10B981;border-color:rgba(16,185,129,.2);background:rgba(16,185,129,.07)}

/* Category badge colors */
.cat-lead{background:rgba(59,130,246,.1);color:#2563EB;border:1px solid rgba(59,130,246,.2)}
.cat-deal{background:rgba(16,185,129,.1);color:#059669;border:1px solid rgba(16,185,129,.2)}
.cat-call{background:rgba(139,92,246,.1);color:#7C3AED;border:1px solid rgba(139,92,246,.2)}
.cat-infra{background:rgba(245,158,11,.1);color:#D97706;border:1px solid rgba(245,158,11,.2)}
[data-theme=dark] .cat-lead{color:#60A5FA}
[data-theme=dark] .cat-deal{color:#34D399}
[data-theme=dark] .cat-call{color:#A78BFA}
[data-theme=dark] .cat-infra{color:#FBBF24}

/* Back to top */
.back-to-top{position:fixed;bottom:24px;right:24px;width:36px;height:36px;border-radius:50%;background:var(--purple);color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;z-index:150;box-shadow:0 2px 8px rgba(107,92,231,.3)}
.back-to-top.visible{opacity:1;pointer-events:auto}

@media(max-width:768px){.sidebar{display:none}.main{margin-left:0 !important}.hero{flex-direction:column}.wf-header,.wf-body,.hero,.summary{padding:16px}.wf-cols{grid-template-columns:1fr}.cards-grid{grid-template-columns:1fr}}
</style></head><body>

<header class="topbar">
  <div class="topbar-brand">
    <div class="brand-logo">S</div>
    <span class="brand-name">Snov.io</span>
    <span class="brand-sep">|</span>
    <span class="brand-sub">Sales Playbook</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-meta" id="topbar-meta"></span>
    <button class="btn-icon" onclick="location.reload()" title="Refresh">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 105.2-11.2L1 10"/></svg>
    </button>
    <div class="theme-toggle">
      <button class="theme-btn active" id="btn-light" onclick="setTheme('light')">Light</button>
      <button class="theme-btn" id="btn-dark" onclick="setTheme('dark')">Dark</button>
    </div>
  </div>
</header>

<nav class="sidebar" id="sidebar"></nav>

<main class="main" id="main-content"></main>

<button class="back-to-top" id="btt" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 15l-6-6-6 6"/></svg>
</button>

<script>
/* ============================================================
   WORKFLOW ORDER — Edit this array when adding/removing workflows.
   The n8n documentation generator can update this constant.
   ============================================================ */
const WORKFLOW_ORDER = [
  // Lead Creation
  { id: 'BQUB8mnTqGB9eL5w', category: 'Lead Creation',    catClass: 'cat-lead', catDot: '#3B82F6', icon: 'L' },
  { id: 'JkcTyGn87jjDlVuQ', category: 'Lead Creation',    catClass: 'cat-lead', catDot: '#3B82F6', icon: 'L' },
  { id: 'V7j1ZgaI9kHPUtwJ', category: 'Lead Creation',    catClass: 'cat-lead', catDot: '#3B82F6', icon: 'L' },
  // Deal Enrichment & Sync
  { id: 'qfPOqBWgOqnWdIvG', category: 'Deal Enrichment & Sync', catClass: 'cat-deal', catDot: '#10B981', icon: 'D' },
  { id: 'BYPDAdpkbLxCWiew', category: 'Deal Enrichment & Sync', catClass: 'cat-deal', catDot: '#10B981', icon: 'D' },
  { id: 'YYQMPCRpAfRjsExQ', category: 'Deal Enrichment & Sync', catClass: 'cat-deal', catDot: '#10B981', icon: 'D' },
  // Call Analysis
  { id: 'AfyRBWkgEONyqNtl', category: 'Call Analysis',    catClass: 'cat-call', catDot: '#8B5CF6', icon: 'C' },
  { id: 'h6Ny08MA0hpoSXJI', category: 'Call Analysis',    catClass: 'cat-call', catDot: '#8B5CF6', icon: 'C' },
  { id: 'm8v1bYhSGhu1cJNh', category: 'Call Analysis',    catClass: 'cat-call', catDot: '#8B5CF6', icon: 'C' },
  // Infrastructure
  { id: 'XEDRiz0EW8fwHi8d', category: 'Infrastructure',   catClass: 'cat-infra', catDot: '#F59E0B', icon: 'I' },
  { id: 'JGZdwcjhxcwkwFsA', category: 'Infrastructure',   catClass: 'cat-infra', catDot: '#F59E0B', icon: 'I' },
  { id: 'ecufqr7ZfxSIEggr', category: 'Infrastructure',   catClass: 'cat-infra', catDot: '#F59E0B', icon: 'I' },
];

/* Display names override (for workflows where cache _name has "(Supabase)" suffix or is missing) */
const DISPLAY_NAMES = {
  'BQUB8mnTqGB9eL5w': 'Inbound Leads Qualification',
  'JkcTyGn87jjDlVuQ': 'Leads coming from events/courses',
  'V7j1ZgaI9kHPUtwJ': 'Create/Update a deal from Discovery Call',
  'qfPOqBWgOqnWdIvG': '(ENRICH) Update deal after Clay enrichment',
  'BYPDAdpkbLxCWiew': 'Sync CRM with Supabase + Add Time per Stage',
  'YYQMPCRpAfRjsExQ': 'Auto-Link Calendar Meetings to Deals',
  'AfyRBWkgEONyqNtl': '(Fireflies) PID Call Analysis + Coach',
  'h6Ny08MA0hpoSXJI': '(RINGOSTAT) Phone Call Analysis',
  'm8v1bYhSGhu1cJNh': '(API4COM) Phone Call Analysis',
  'XEDRiz0EW8fwHi8d': 'Error Monitor — Auto-Fix + Alert',
  'JGZdwcjhxcwkwFsA': 'Transcript Embedding Generator (Daily)',
  'ecufqr7ZfxSIEggr': 'Live update on Github documentations',
};

let DATA = {};

/* Theme */
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('theme', t);
  document.getElementById('btn-light').classList.toggle('active', t === 'light');
  document.getElementById('btn-dark').classList.toggle('active', t === 'dark');
}
(function() {
  const saved = localStorage.getItem('theme');
  if (saved) setTheme(saved);
})();

/* Sidebar collapse */
function toggleSidebar() {
  document.body.classList.toggle('sidebar-collapsed');
  localStorage.setItem('sidebar-collapsed', document.body.classList.contains('sidebar-collapsed'));
}
(function() {
  if (localStorage.getItem('sidebar-collapsed') === 'true') {
    document.body.classList.add('sidebar-collapsed');
  }
})();

/* Back to top */
window.addEventListener('scroll', function() {
  document.getElementById('btt').classList.toggle('visible', window.scrollY > 400);
});

/* Helper: shorten trigger text for card */
function shortTrigger(t) {
  if (!t) return '';
  const s = t.replace(/^(Triggered by |Starts when |Fires when |Runs )/i, '');
  return s.charAt(0).toUpperCase() + s.slice(1);
}

/* Helper: get node type CSS class */
function ntClass(type) {
  return 'nt nt-' + type.replace(/\s+/g, '');
}

/* Load and render */
fetch('cache.json?_=' + Date.now())
  .then(r => r.json())
  .then(data => {
    DATA = data.workflows || {};
    render();
  })
  .catch(e => {
    document.getElementById('main-content').innerHTML = '<div style="padding:40px;color:red">Error loading cache.json: ' + e.message + '</div>';
  });

function getName(id) {
  return DISPLAY_NAMES[id] || (DATA[id] && DATA[id].doc && DATA[id].doc._name) || id;
}

function getDoc(id) {
  return DATA[id] && DATA[id].doc ? DATA[id].doc : null;
}

function render() {
  /* Compute date from cache file modification or fallback */
  let dateStr = '';
  const allDocs = WORKFLOW_ORDER.map(w => getDoc(w.id)).filter(Boolean);
  /* Use current date as display date */
  const now = new Date();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  dateStr = months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();

  const wfCount = WORKFLOW_ORDER.length;

  /* Topbar meta */
  document.getElementById('topbar-meta').textContent = wfCount + ' workflows \u00B7 ' + dateStr;

  /* Build sidebar */
  let sidebarHTML = '<div class="nav-section">';
  let lastCat = '';
  WORKFLOW_ORDER.forEach(w => {
    const doc = getDoc(w.id);
    if (!doc) return;
    if (w.category !== lastCat) {
      if (lastCat) sidebarHTML += '</div><div class="nav-section">';
      sidebarHTML += '<div class="nav-section-label">' + esc(w.category) + '</div>';
      lastCat = w.category;
    }
    const name = getName(w.id);
    sidebarHTML += '<a href="#wf-' + w.id + '" class="nav-item" data-tooltip="' + esc(name) + '">' +
      '<span class="nav-icon" style="background:' + w.catDot + '">' + w.icon + '</span>' +
      '<span class="nav-label">' + esc(name) + '</span></a>';
  });
  sidebarHTML += '</div>';
  sidebarHTML += '<div class="sidebar-toggle"><button onclick="toggleSidebar()" title="Toggle sidebar">' +
    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 3H3v18h18V3z"/><path d="M9 3v18"/></svg>' +
    '</button></div>';
  document.getElementById('sidebar').innerHTML = sidebarHTML;

  /* Build main content */
  let html = '';

  /* Hero */
  html += '<div class="hero"><div class="hero-left">' +
    '<div class="hero-eyebrow">Snov.io \u00B7 Sales Engineering</div>' +
    '<h1>N8N Technical Documentation</h1>' +
    '<p class="hero-desc">Live technical documentation for all active sales automations. Auto-generated from n8n workflow definitions.</p>' +
    '</div><div class="hero-stats">' +
    '<div class="stat"><div class="stat-num">' + wfCount + '</div><div class="stat-label">Active workflows</div></div>' +
    '</div></div>';

  /* Summary cards by category */
  html += '<div class="summary">';
  const categories = [];
  const catMap = {};
  WORKFLOW_ORDER.forEach(w => {
    if (!catMap[w.category]) {
      catMap[w.category] = [];
      categories.push({ name: w.category, cls: w.catClass, dot: w.catDot });
    }
    catMap[w.category].push(w);
  });

  categories.forEach(cat => {
    html += '<div class="summary-category">';
    html += '<div class="summary-category-label"><span class="cat-dot" style="background:' + cat.dot + '"></span>' + esc(cat.name) + '</div>';
    html += '<div class="cards-grid">';
    catMap[cat.name].forEach(w => {
      const doc = getDoc(w.id);
      if (!doc) return;
      const name = getName(w.id);
      html += '<a href="#wf-' + w.id + '" class="card" onclick="smoothNav(event,\'' + w.id + '\')">' +
        '<div class="card-name">' + esc(name) + '</div>' +
        '<div class="card-trigger">' + esc(shortTrigger(doc.trigger)) + '</div>' +
        '</a>';
    });
    html += '</div></div>';
  });
  html += '</div>';

  /* Workflow detail sections */
  WORKFLOW_ORDER.forEach((w, idx) => {
    const doc = getDoc(w.id);
    if (!doc) return;
    const name = getName(w.id);

    html += '<section class="workflow" id="wf-' + w.id + '">';

    /* Header */
    html += '<div class="wf-header">';
    html += '<div class="wf-meta">';
    html += '<span class="wf-badge">Active</span>';
    html += '<span class="wf-cat ' + w.catClass + '">' + esc(w.category) + '</span>';
    html += '<span class="wf-id">' + w.id + '</span>';
    html += '</div>';
    html += '<h2>' + esc(name) + '</h2>';
    html += '<div class="wf-trigger">' + esc(doc.trigger) + '</div>';
    html += '<p class="wf-overview" style="margin-top:8px">' + esc(doc.overview) + '</p>';
    html += '</div>';

    /* Body */
    html += '<div class="wf-body"><div class="wf-cols">';

    /* Left: phases + notes */
    html += '<div class="wf-left">';
    html += '<div class="section-label">Execution Flow</div>';
    html += '<div class="phases">';
    if (doc.phases) {
      doc.phases.forEach((p, i) => {
        html += '<div class="phase"><span class="phase-num">' + (i + 1) + '</span><div><strong>' + esc(p[0]) + '</strong><span class="phase-sep"> \u2014 </span>' + esc(p[1]) + '</div></div>';
      });
    }
    html += '</div>';
    if (doc.notes) {
      html += '<div class="section-label" style="margin-top:20px">Technical Notes</div>';
      html += '<p class="notes">' + esc(doc.notes) + '</p>';
    }
    html += '</div>';

    /* Right: node table */
    html += '<div class="wf-right">';
    html += '<div class="section-label">Node Reference</div>';
    html += '<div class="table-wrap"><table><thead><tr><th>Node</th><th>Type</th><th>Description</th></tr></thead><tbody>';
    if (doc.nodes) {
      doc.nodes.forEach(n => {
        html += '<tr><td class="node-name">' + esc(n[0]) + '</td><td><span class="' + ntClass(n[1]) + '">' + esc(n[1]) + '</span></td><td class="node-desc">' + esc(n[2]) + '</td></tr>';
      });
    }
    html += '</tbody></table></div>';
    html += '</div>';

    html += '</div></div>';
    html += '</section>';
  });

  document.getElementById('main-content').innerHTML = html;
}

function smoothNav(e, id) {
  e.preventDefault();
  const el = document.getElementById('wf-' + id);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    history.pushState(null, '', '#wf-' + id);
  }
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body></html>
